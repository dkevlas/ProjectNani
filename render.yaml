services:
  - type: web
    name: whatsapp-ai-bot
    env: node
    plan: free
    buildCommand: npm install && npx puppeteer browsers install chrome
    startCommand: node index.js
    envVars:
      - key: GEMINI_API_KEY
        sync: false        # lo escribes tú en el dashboard de Render
      - key: FRIEND_NUMBER
        sync: false        # ej: 5491123456789 (sin + ni espacios)
      - key: NODE_OPTIONS
        value: --max-old-space-size=320
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/src/.cache/puppeteer

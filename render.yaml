services:
  - type: web
    name: whatsapp-ai-bot
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: FRIEND_NUMBER
        sync: false
      - key: NODE_OPTIONS
        value: --max-old-space-size=256
      - key: LOW_MEMORY
        value: "1"
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "true"
      - key: CHROME_BIN
        value: /usr/bin/chromium
    disk:
      name: wwebjs-auth
      mountPath: /tmp/wwebjs_auth
      sizeGB: 1
